services:
  postgres:
    image: postgres:17
    container_name: uuid_bench_postgres
    shm_size: '2gb'
    network_mode: host
    environment:
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
      POSTGRES_DB: bench
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
      -c fsync=off
      -c full_page_writes=off
      -c synchronous_commit=off
      -c shared_buffers=1GB
      -c work_mem=64MB
      -c max_connections=100
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench -d bench"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:8
    container_name: uuid_bench_mongo
    network_mode: host
    environment:
      - GLIBC_TUNABLES=glibc.cpu.x86_shstk=off
    volumes:
      - mongo_data:/data/db
    command: >
      mongod
      --bind_ip_all
      --syncdelay 0
      --wiredTigerCacheSizeGB 2
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  mongo_data:
